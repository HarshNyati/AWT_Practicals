<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Express Static File</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(120deg, #f5f7fa, #c3cfe2);
      color: #1f2937;
    }

    .card {
      background: #ffffff;
      padding: 24px 28px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(31, 41, 55, 0.15);
      text-align: center;
      max-width: 560px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.6rem;
    }

    p {
      margin: 0;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Express Static Page</h1>
    <p>This page is being served from the public folder via express.static().</p>
  </div>
</body>
</html>
